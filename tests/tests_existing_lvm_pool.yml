---
- name: Test managing existing lvm pool
  hosts: all
  become: true
  vars:
    mount_location: '/opt/test1'
    volume_group_size: '5g'
    volume_size: '4g'
    pool_name: foo
    __storage_min_size: "{{ volume_group_size }}"
    __storage_max_return: 1
  tags:
    - tests::lvm

  tasks:
    - name: Prep storage role and discover unused disks
      ansible.builtin.include_tasks: tasks/setup.yml

    - name: Create one LVM logical volume under one volume group
      include_tasks: tasks/run_role_with_clear_facts.yml
      vars:
        storage_pools:
          - name: "{{ pool_name }}"
            disks: "{{ unused_disks }}"
            volumes:
              - name: test1
                size: "{{ volume_size }}"

    - name: Verify role results
      include_tasks: verify-role-results.yml

    - name: Create another volume in the existing pool, identified only by name.
      include_tasks: tasks/run_role_with_clear_facts.yml
      vars:
        storage_pools:
          - name: "{{ pool_name }}"
            volumes:
              - name: newvol
                size: '2 GiB'
                fs_type: ext4
                fs_label: newvol

    - name: Verify role results - 2
      include_tasks: verify-role-results.yml

    - name: Clean up.
      include_tasks: tasks/run_role_with_clear_facts.yml
      vars:
        storage_pools:
          - name: "{{ pool_name }}"
            state: absent

    - name: Verify role results - 3
      include_tasks: verify-role-results.yml
