---
- name: Test management of swap
  hosts: all
  vars:
    storage_safe_mode: false
    mount_location: /opt/test
    volume_size: '5g'
    __swap_disk: "{{ unused_disks[0] }}"
    __non_swap_disk: "{{ unused_disks[1] }}"
    __storage_min_size: "{{ volume_size }}"
    __storage_max_return: 2
    __storage_disks_needed: 2
    __storage_max_size: >-
      {{ '127g' if (ansible_facts['os_family'] == 'RedHat'
      and ansible_facts['distribution_major_version'] is version('8', '<'))
      else '0' }}
  tasks:
    - name: Prep storage role and discover unused disks
      ansible.builtin.include_tasks: tasks/setup.yml

    - name: Create a disk device with swap
      include_tasks: tasks/run_role_with_clear_facts.yml
      vars:
        storage_volumes:
          - name: test1
            type: disk
            disks: "{{ [__swap_disk] }}"
            fs_type: swap

    - name: Verify results
      include_tasks: verify-role-results.yml

    - name: Format second disk as ext3
      include_tasks: tasks/run_role_with_clear_facts.yml
      vars:
        storage_volumes:
          - name: test2
            type: disk
            mount_point: none
            fs_type: ext3
            disks: "{{ [__non_swap_disk] }}"

    - name: Verify results - 2
      include_tasks: verify-role-results.yml

    - name: Change the disk device file system type from swap to ext3
      include_tasks: tasks/run_role_with_clear_facts.yml
      vars:
        storage_volumes:
          - name: test1
            type: disk
            mount_point: "{{ mount_location }}"
            fs_type: ext3
            disks: "{{ [__swap_disk] }}"

    - name: Verify results - 3
      include_tasks: verify-role-results.yml

    - name: Repeat the previous invocation to verify idempotence
      include_tasks: tasks/run_role_with_clear_facts.yml
      vars:
        storage_volumes:
          - name: test1
            type: disk
            mount_point: "{{ mount_location }}"
            fs_type: ext3
            disks: "{{ [__swap_disk] }}"

    - name: Verify results - 4
      include_tasks: verify-role-results.yml

    - name: Change it back to swap
      include_tasks: tasks/run_role_with_clear_facts.yml
      vars:
        storage_volumes:
          - name: test1
            type: disk
            disks: "{{ [__swap_disk] }}"
            fs_type: swap

    - name: Verify results - 5
      include_tasks: verify-role-results.yml

    - name: Repeat the previous invocation to verify idempotence - 2
      include_tasks: tasks/run_role_with_clear_facts.yml
      vars:
        storage_volumes:
          - name: test1
            type: disk
            disks: "{{ [__swap_disk] }}"
            fs_type: swap

    - name: Verify results - 6
      include_tasks: verify-role-results.yml

    - name: Clean up
      include_tasks: tasks/run_role_with_clear_facts.yml
      vars:
        storage_volumes:
          - name: test1
            type: disk
            disks: "{{ [__swap_disk] }}"
            mount_point: "{{ mount_location }}"
            state: absent
          - name: test2
            type: disk
            disks: "{{ [__non_swap_disk] }}"
            mount_point: none
            state: absent

    - name: Verify results - 7
      include_tasks: verify-role-results.yml
