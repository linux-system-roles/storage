---
- name: Test stratis pool management
  hosts: all
  become: true
  vars:
    mount_location: '/opt/test1'
    mount_location_2: '/opt/test2'
    volume_group_size: '5g'
    volume_size: '4g'
    __storage_min_size: "{{ volume_group_size }}"
    __storage_disks_needed: 2
  tags:
    - tests::stratis

  tasks:
    - name: Storage test setup
      ansible.builtin.include_tasks: tasks/setup.yml
      vars:
        __storage_get_package_facts: true
        # From gather_facts only (safe before setup runs); mirrors is_rhel78 in setup.yml
        __storage_get_unused_disks: "{{ not (ansible_facts['os_family'] == 'RedHat' and (ansible_facts['distribution_major_version'] == '7' or ansible_facts['distribution_major_version'] == '8')) }}"

    - name: Completely skip this on RHEL/CentOS 7 and 8 where Stratis isn't supported by blivet
      when: not is_rhel78
      block:
        # stratisd is not started automatically and doesn't support DBus activation
        # this will be covered by Blivet in the next build
        - name: Start stratisd service
          service:
            name: stratisd
            state: started

        - name: One pool/volume test
          block:

            - name: Create one Stratis pool with one volume
              include_tasks: tasks/run_role_with_clear_facts.yml
              vars:
                storage_pools:
                  - name: foo
                    disks: "{{ unused_disks }}"
                    type: stratis
                    volumes:
                      - name: test1
                        size: "{{ volume_size }}"
                        mount_point: "{{ mount_location }}"

            - name: Verify role results
              include_tasks: verify-role-results.yml

            - name: Repeat the previous invocation to verify idempotence
              include_tasks: tasks/run_role_with_clear_facts.yml
              vars:
                storage_pools:
                  - name: foo
                    disks: "{{ unused_disks }}"
                    type: stratis
                    volumes:
                      - name: test1
                        size: "{{ volume_size }}"
                        mount_point: "{{ mount_location }}"

            - name: Verify role results - 2
              include_tasks: verify-role-results.yml

            - name: Add second filesystem to the pool
              include_tasks: tasks/run_role_with_clear_facts.yml
              vars:
                storage_pools:
                  - name: foo
                    disks: "{{ unused_disks }}"
                    type: stratis
                    volumes:
                      - name: test1
                        size: "{{ volume_size }}"
                        mount_point: "{{ mount_location }}"
                      - name: test2
                        size: "{{ volume_size }}"
                        mount_point: "{{ mount_location_2 }}"

            - name: Verify role results - 3
              include_tasks: verify-role-results.yml

          always:

            - name: Clean up
              include_tasks: tasks/run_role_with_clear_facts.yml
              vars:
                storage_pools:
                  - name: foo
                    disks: "{{ unused_disks }}"
                    type: stratis
                    state: absent
                    volumes:
                      - name: test1
                        size: "{{ volume_size }}"
                        mount_point: "{{ mount_location }}"
                        state: absent
                      - name: test2
                        size: "{{ volume_size }}"
                        mount_point: "{{ mount_location_2 }}"
                        state: absent

        - name: Verify role results - 4
          include_tasks: verify-role-results.yml

        - name: Run test only if blivet supports this functionality
          when: ((is_fedora and blivet_pkg_version is version("3.10.0-1", ">=")) or
                (is_rhel10 and blivet_pkg_version is version("3.10.0-1", ">=")) or
                (is_rhel9 and blivet_pkg_version is version("3.6.0-15", ">=")))
          block:
            - name: Test encrypted pool
              block:

                - name: Create encrypted Stratis pool
                  include_tasks: tasks/run_role_with_clear_facts.yml
                  vars:
                    storage_pools:
                      - name: foo
                        disks: "{{ unused_disks }}"
                        type: stratis
                        encryption: true
                        encryption_password: yabbadabbadoo
                        volumes:
                          - name: test1
                            size: "{{ volume_size }}"
                            mount_point: "{{ mount_location }}"

                - name: Verify role results - 5
                  include_tasks: verify-role-results.yml

                - name: Repeat the previous invocation to verify idempotence - 2
                  include_tasks: tasks/run_role_with_clear_facts.yml
                  vars:
                    storage_pools:
                      - name: foo
                        disks: "{{ unused_disks }}"
                        type: stratis
                        encryption: true
                        encryption_password: yabbadabbadoo
                        volumes:
                          - name: test1
                            size: "{{ volume_size }}"
                            mount_point: "{{ mount_location }}"

                - name: Verify role results - 6
                  include_tasks: verify-role-results.yml

              always:

                - name: Clean up - 2
                  include_tasks: tasks/run_role_with_clear_facts.yml
                  vars:
                    storage_pools:
                      - name: foo
                        disks: "{{ unused_disks }}"
                        type: stratis
                        state: absent
                        volumes:
                          - name: test1
                            size: "{{ volume_size }}"
                            mount_point: "{{ mount_location }}"
                            state: absent

            - name: Verify role results - 7
              include_tasks: verify-role-results.yml

            - name: Test one disk pool
              block:

                - name: Create one Stratis pool on one disk
                  include_tasks: tasks/run_role_with_clear_facts.yml
                  vars:
                    storage_pools:
                      - name: foo
                        disks: "{{ unused_disks[0] }}"
                        type: stratis

                - name: Verify role results - 8
                  include_tasks: verify-role-results.yml

                - name: Add the second disk to the pool
                  include_tasks: tasks/run_role_with_clear_facts.yml
                  vars:
                    storage_pools:
                      - name: foo
                        disks: "{{ [unused_disks[0], unused_disks[1]] }}"
                        type: stratis

                - name: Verify role results - 9
                  include_tasks: verify-role-results.yml

              always:

                - name: Clean up - 3
                  include_tasks: tasks/run_role_with_clear_facts.yml
                  vars:
                    storage_pools:
                      - name: foo
                        disks: "{{ unused_disks }}"
                        type: stratis
                        state: absent
                        volumes:
                          - name: test1
                            size: "{{ volume_size }}"
                            mount_point: "{{ mount_location }}"
                            state: absent

            - name: Verify role results - 10
              include_tasks: verify-role-results.yml

            - name: Setup Tang server on localhost for testing
              ansible.builtin.include_role:
                name: fedora.linux_system_roles.nbde_server
              vars:
                nbde_server_manage_firewall: true
                nbde_server_manage_selinux: true
                nbde_server_port: 7500

            - name: Clevis/Tang test
              block:
                - name: Create encrypted Stratis pool with Clevis/Tang
                  include_tasks: tasks/run_role_with_clear_facts.yml
                  vars:
                    storage_pools:
                      - name: foo
                        disks: "{{ unused_disks[0] }}"
                        type: stratis
                        encryption: true
                        encryption_password: yabbadabbadoo
                        encryption_clevis_pin: tang
                        encryption_tang_url: localhost:7500

                - name: Verify role results - 11
                  include_tasks: verify-role-results.yml

              always:
                - name: Clean up - 4
                  include_tasks: tasks/run_role_with_clear_facts.yml
                  vars:
                    storage_pools:
                      - name: foo
                        disks: "{{ unused_disks[0] }}"
                        type: stratis
                        state: absent

            - name: Verify role results - 12
              include_tasks: verify-role-results.yml
