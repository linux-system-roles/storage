---
- name: Test lvm one disk multiple volumes
  hosts: all
  become: true
  vars:
    volume_group_size: '10g'
    volume_size: '3g'
    __storage_min_size: "{{ volume_group_size }}"
    __storage_max_return: 1
  tags:
    - tests::lvm

  tasks:
    - name: Prep storage role and discover unused disks
      ansible.builtin.include_tasks: tasks/setup.yml

    - name: Create three LVM logical volumes under one volume group
      include_tasks: tasks/run_role_with_clear_facts.yml
      vars:
        storage_pools:
          - name: foo
            disks: "{{ unused_disks }}"
            volumes:
              - name: test1
                size: "{{ volume_size }}"
                mount_point: '/opt/test1'
              - name: test2
                size: "{{ volume_size }}"
                mount_point: '/opt/test2'
              - name: test3
                size: "{{ volume_size }}"
                mount_point: '/opt/test3'

    - name: Verify role results
      include_tasks: verify-role-results.yml

    - name: Repeat the previous invocation to verify idempotence
      include_tasks: tasks/run_role_with_clear_facts.yml
      vars:
        storage_pools:
          - name: foo
            disks: "{{ unused_disks }}"
            volumes:
              - name: test1
                size: "{{ volume_size }}"
                mount_point: '/opt/test1'
              - name: test2
                size: "{{ volume_size }}"
                mount_point: '/opt/test2'
              - name: test3
                size: "{{ volume_size }}"
                mount_point: '/opt/test3'

    - name: Verify role results - 2
      include_tasks: verify-role-results.yml

    - name: Remove two of the LVs
      include_tasks: tasks/run_role_with_clear_facts.yml
      vars:
        storage_pools:
          - name: foo
            disks: "{{ unused_disks }}"
            volumes:
              - name: test1
                size: "{{ volume_size }}"
                mount_point: '/opt/test1'
              - name: test2
                size: "{{ volume_size }}"
                mount_point: '/opt/test2'
                state: absent
              - name: test3
                size: "{{ volume_size }}"
                mount_point: '/opt/test3'
                state: absent

    - name: Verify role results - 3
      include_tasks: verify-role-results.yml

    - name: Re-run the previous role invocation to ensure idempotence
      include_tasks: tasks/run_role_with_clear_facts.yml
      vars:
        storage_pools:
          - name: foo
            disks: "{{ unused_disks }}"
            volumes:
              - name: test1
                size: "{{ volume_size }}"
                mount_point: '/opt/test1'
              - name: test2
                size: "{{ volume_size }}"
                mount_point: '/opt/test2'
                state: absent
              - name: test3
                size: "{{ volume_size }}"
                mount_point: '/opt/test3'
                state: absent

    - name: Verify role results - 4
      include_tasks: verify-role-results.yml

    - name: Clean up
      include_tasks: tasks/run_role_with_clear_facts.yml
      vars:
        storage_pools:
          - name: foo
            disks: "{{ unused_disks }}"
            state: absent
            volumes: []
