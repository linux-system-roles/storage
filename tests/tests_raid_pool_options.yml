---
- name: Test raid pool options
  hosts: all
  become: true
  vars:
    storage_safe_mode: false
    storage_use_partitions: true
    mount_location1: '/opt/test1'
    mount_location2: '/opt/test2'
    mount_location3: '/opt/test3'
    volume1_size: '2g'
    volume3_size: '3g'
    volume2_size: '3g'
    __storage_max_return: 3
    __storage_disks_needed: 3
  tags:
    - tests::lvm

  tasks:
    - name: Prep storage role and discover unused disks
      ansible.builtin.include_tasks: tasks/setup.yml

    - name: Create a RAID1 device
      include_tasks: tasks/run_role_with_clear_facts.yml
      vars:
        storage_pools:
          - name: vg1
            disks: "{{ unused_disks }}"
            type: lvm
            raid_level: "raid1"
            raid_device_count: 2
            raid_spare_count: 1
            raid_metadata_version: "1.0"
            state: present
            volumes:
              - name: lv1
                size: "{{ volume1_size }}"
                mount_point: "{{ mount_location1 }}"
              - name: Lv2
                size: "{{ volume2_size }}"
                mount_point: "{{ mount_location2 }}"
              - name: Lv3
                size: "{{ volume3_size }}"
                mount_point: "{{ mount_location3 }}"

    - name: Verify role results
      include_tasks: verify-role-results.yml

    - name: Repeat the previous invocation minus the pool raid options
      include_tasks: tasks/run_role_with_clear_facts.yml
      vars:
        storage_pools:
          - name: vg1
            disks: "{{ unused_disks }}"
            type: lvm
            state: present
            volumes:
              - name: lv1
                size: "{{ volume1_size }}"
                mount_point: "{{ mount_location1 }}"
              - name: Lv2
                size: "{{ volume2_size }}"
                mount_point: "{{ mount_location2 }}"
              - name: Lv3
                size: "{{ volume3_size }}"
                mount_point: "{{ mount_location3 }}"

    - name: Assert to preserve RAID settings for preexisting pool
      assert:
        that: not blivet_output.changed and
              blivet_output.pools[0].raid_level == 'raid1' and
              blivet_output.pools[0].raid_device_count == 2 and
              blivet_output.pools[0].raid_spare_count == 1 and
              blivet_output.pools[0].raid_metadata_version == '1.0'
        msg: "Failure to preserve RAID settings for preexisting pool."

    - name: Verify role results - 2
      include_tasks: verify-role-results.yml

    - name: Remove the pool created above
      include_tasks: tasks/run_role_with_clear_facts.yml
      vars:
        storage_pools:
          - name: vg1
            disks: "{{ unused_disks }}"
            type: lvm
            raid_level: "raid1"
            raid_device_count: 2
            raid_spare_count: 1
            raid_metadata_version: "1.0"
            state: absent
            volumes:
              - name: lv1
                size: "{{ volume1_size }}"
                mount_point: "{{ mount_location1 }}"
              - name: Lv2
                size: "{{ volume2_size }}"
                mount_point: "{{ mount_location2 }}"
              - name: Lv3
                size: "{{ volume3_size }}"
                mount_point: "{{ mount_location3 }}"

    - name: Verify role results - 3
      include_tasks: verify-role-results.yml

    - name: Create a RAID0 device
      include_tasks: tasks/run_role_with_clear_facts.yml
      vars:
        storage_pools:
          - name: vg1
            disks: "{{ unused_disks }}"
            type: lvm
            raid_level: "raid0"
            raid_device_count: 3
            raid_metadata_version: "1.0"
            raid_chunk_size: "1024 KiB"
            state: present

    - name: Verify role results - 4
      include_tasks: verify-role-results.yml

    - name: Remove the pool created above - 2
      include_tasks: tasks/run_role_with_clear_facts.yml
      vars:
        storage_pools:
          - name: vg1
            disks: "{{ unused_disks }}"
            type: lvm
            raid_level: "raid0"
            raid_device_count: 3
            raid_metadata_version: "1.0"
            raid_chunk_size: "1024 KiB"
            state: absent

    - name: Verify role results - 5
      include_tasks: verify-role-results.yml
