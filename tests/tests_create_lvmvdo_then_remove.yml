---
- name: Test VDO creation and remove
  hosts: all
  become: true
  vars:
    storage_safe_mode: false
    storage_use_partitions: true
    mount_location: '/opt/test1'
    volume_group_size: '10g'
    volume_size: '12g'
    pool_size: '9g'
  tags:
    - tests::lvm

  tasks:
    - name: Storage test setup
      ansible.builtin.include_tasks: tasks/setup.yml
      vars:
        __storage_storage_skip_checks:
          - blivet_available
        __storage_get_package_facts: true
        __storage_get_unused_disks: false

    - name: Check if kvdo is loadable
      ansible.builtin.command: modprobe --dry-run kvdo
      ignore_errors: true  # noqa ignore-errors
      changed_when: false
      register: __storage_kvdo_loadable

    - name: Check if dm-vdo is loadable
      ansible.builtin.command: modprobe --dry-run dm-vdo
      ignore_errors: true  # noqa ignore-errors
      changed_when: false
      register: __storage_dmvdo_loadable

    - name: Set libblockdev package version
      ansible.builtin.set_fact:
        libblockdev_pkg_version: "{{
          ansible_facts.packages['libblockdev'][0]['version'] +
          '-' + ansible_facts.packages['libblockdev'][0]['release'] }}"

    - name: Run tests if VDO is available
      when: (blivet_pkg_version is defined and blivet_pkg_version is version("3.2.2-10", ">="))
            and (not is_fedora or libblockdev_pkg_version is version("3.1.1-2", ">="))
            and (__storage_kvdo_loadable is success or __storage_dmvdo_loadable is success)
      block:
        - name: Collect unused disks for VDO test
          ansible.builtin.include_tasks: tasks/get_unused_disk.yml
          vars:
            min_size: "{{ volume_group_size }}"
            max_return: 1

        - name: Create LVM VDO volume under volume group 'pool1'
          include_tasks: tasks/run_role_with_clear_facts.yml
          vars:
            storage_pools:
              - name: pool1
                disks: "{{ unused_disks }}"
                volumes:
                  - name: volume1
                    compression: true
                    deduplication: true
                    vdo_pool_size: "{{ pool_size }}"
                    size: "{{ volume_size }}"
                    mount_point: "{{ mount_location }}"

        - name: Verify role results
          include_tasks: verify-role-results.yml

        - name: Repeat the previous invocation to verify idempotence
          include_tasks: tasks/run_role_with_clear_facts.yml
          vars:
            storage_pools:
              - name: pool1
                disks: "{{ unused_disks }}"
                volumes:
                  - name: volume1
                    compression: true
                    deduplication: true
                    vdo_pool_size: "{{ pool_size }}"
                    size: "{{ volume_size }}"
                    mount_point: "{{ mount_location }}"

        - name: Verify role results - 2
          include_tasks: verify-role-results.yml

        - name: Remove LVM VDO volume in 'pool1' created above
          include_tasks: tasks/run_role_with_clear_facts.yml
          vars:
            storage_pools:
              - name: pool1
                disks: "{{ unused_disks }}"
                state: absent
                volumes:
                  - name: volume1
                    compression: true
                    deduplication: true
                    vdo_pool_size: "{{ pool_size }}"
                    size: "{{ volume_size }}"
                    mount_point: "{{ mount_location }}"

        - name: Verify role results - 3
          include_tasks: verify-role-results.yml

        - name: >-
            Create LVM VDO volume under volume group 'pool1' (this time
            default size)
          include_tasks: tasks/run_role_with_clear_facts.yml
          vars:
            storage_pools:
              - name: pool1
                disks: "{{ unused_disks }}"
                volumes:
                  - name: volume1
                    compression: true
                    deduplication: true
                    size: "{{ volume_size }}"
                    mount_point: "{{ mount_location }}"

        - name: Verify role results - 4
          include_tasks: verify-role-results.yml

        - name: Remove LVM VDO volume in 'pool1' created above - 2
          include_tasks: tasks/run_role_with_clear_facts.yml
          vars:
            storage_pools:
              - name: pool1
                disks: "{{ unused_disks }}"
                state: absent
                volumes:
                  - name: volume1
                    compression: true
                    deduplication: true
                    size: "{{ volume_size }}"
                    mount_point: "{{ mount_location }}"

        - name: Verify role results - 5
          include_tasks: verify-role-results.yml
